<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sigma Boi Koko</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      background: #0d0d0d;
      color: #fff;
      font-family: 'Geist', system-ui, -apple-system, sans-serif;
      user-select: none;
      overflow: hidden;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 22px 0;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Stormtrooper helmet SVG icon */
    .logo-icon {
      width: 22px;
      height: 22px;
      opacity: 0.7;
    }

    .wordmark {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    .tab-badge {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.2);
      font-variant-numeric: tabular-nums;
    }

    /* HERO */
    .hero {
      padding: 28px 22px 8px;
    }

    .pct-row {
      display: flex;
      align-items: flex-start;
      gap: 2px;
      line-height: 1;
    }

    .pct-num {
      font-size: 64px;
      font-weight: 300;
      color: rgba(255,255,255,0.92);
      letter-spacing: -3px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      transition: color 0.25s;
    }

    .pct-unit {
      font-size: 18px;
      font-weight: 300;
      color: rgba(255,255,255,0.25);
      margin-top: 12px;
    }

    .status-line {
      margin-top: 8px;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.22);
      min-height: 16px;
      transition: color 0.25s;
    }
    .status-line.boosted { color: rgba(130,255,160,0.55); }
    .status-line.muted   { color: rgba(255,80,80,0.45); }

    /* SLIDER */
    .slider-section { padding: 24px 22px 0; }

    .track-wrap {
      position: relative;
      height: 24px;
      display: flex;
      align-items: center;
    }

    .track-bg {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      pointer-events: none;
    }

    .track-fill {
      position: absolute;
      left: 0;
      height: 2px;
      background: rgba(255,255,255,0.28);
      border-radius: 2px;
      pointer-events: none;
      transition: width 0.05s, background 0.25s;
    }
    .track-fill.boosted { background: rgba(130,255,160,0.45); }
    .track-fill.muted   { background: rgba(255,255,255,0.08); }

    input[type="range"] {
      -webkit-appearance: none;
      position: relative;
      width: 100%;
      height: 24px;
      background: transparent;
      cursor: pointer;
      outline: none;
      margin: 0;
      z-index: 2;
    }
    input[type="range"]::-webkit-slider-runnable-track {
      background: transparent;
      height: 2px;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #e8e8e8;
      margin-top: -6px;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
      transition: box-shadow 0.15s, transform 0.1s;
    }
    input[type="range"]:hover::-webkit-slider-thumb {
      box-shadow: 0 0 0 5px rgba(255,255,255,0.1);
    }
    input[type="range"]:active::-webkit-slider-thumb { transform: scale(0.9); }

    .scale {
      display: flex;
      justify-content: space-between;
      padding: 6px 0 0;
    }
    .scale span {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.15);
    }

    /* BOOST TOGGLES */
    .boost-section {
      padding: 18px 22px 0;
      display: flex;
      gap: 8px;
    }

    .boost-btn {
      flex: 1;
      height: 34px;
      border-radius: 9px;
      border: 0.5px solid rgba(255,255,255,0.09);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.35);
      font-family: 'Geist', system-ui, sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .boost-btn svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .boost-btn:hover {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.6);
      border-color: rgba(255,255,255,0.15);
    }

    /* Bass active — warm amber tint */
    .boost-btn.bass-active {
      border-color: rgba(255,190,60,0.35);
      color: rgba(255,190,60,0.75);
      background: rgba(255,170,30,0.07);
    }
    .boost-btn.bass-active:hover {
      background: rgba(255,170,30,0.12);
      color: rgba(255,210,80,0.9);
    }

    /* Voice active — cool blue tint */
    .boost-btn.voice-active {
      border-color: rgba(80,160,255,0.35);
      color: rgba(100,170,255,0.75);
      background: rgba(60,140,255,0.07);
    }
    .boost-btn.voice-active:hover {
      background: rgba(60,140,255,0.12);
      color: rgba(120,185,255,0.9);
    }

    /* CONTROLS */
    .controls {
      display: flex;
      gap: 8px;
      padding: 10px 22px 22px;
    }

    .btn {
      flex: 1;
      height: 36px;
      border-radius: 9px;
      border: 0.5px solid rgba(255,255,255,0.09);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.4);
      font-family: 'Geist', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:hover {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.65);
      border-color: rgba(255,255,255,0.15);
    }

    .btn.mute-active {
      border-color: rgba(255,70,70,0.3);
      color: rgba(255,100,100,0.65);
      background: rgba(255,60,60,0.05);
    }
    .btn.mute-active:hover {
      background: rgba(255,60,60,0.1);
      color: rgba(255,120,120,0.8);
    }

    .btn svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo-area">
      <!-- Stormtrooper helmet icon -->
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C7.5 2 4 6 4 10.5V14l2 1v3h12v-3l2-1v-3.5C20 6 16.5 2 12 2z" fill="rgba(255,255,255,0.75)" stroke="none"/>
        <path d="M8 14.5h3v2H8zM13 14.5h3v2h-3z" fill="#0d0d0d"/>
        <path d="M7 12.5C7 12.5 8 11 12 11s5 1.5 5 1.5" stroke="#0d0d0d" stroke-width="1" fill="none"/>
        <ellipse cx="9" cy="10" rx="1.5" ry="1" fill="#0d0d0d"/>
        <ellipse cx="15" cy="10" rx="1.5" ry="1" fill="#0d0d0d"/>
      </svg>
      <span class="wordmark">Koko</span>
    </div>
    <span class="tab-badge" id="tabBadge">Tab —</span>
  </div>

  <div class="hero">
    <div class="pct-row">
      <div class="pct-num" id="volumeNumber">100</div>
      <div class="pct-unit">%</div>
    </div>
    <div class="status-line" id="statusLine">Active</div>
  </div>

  <div class="slider-section">
    <div class="track-wrap">
      <div class="track-bg"></div>
      <div class="track-fill" id="trackFill"></div>
      <input type="range" id="volumeSlider" min="0" max="600" value="100" step="1" />
    </div>
    <div class="scale">
      <span>0</span>
      <span>100%</span>
      <span>300%</span>
      <span>600%</span>
    </div>
  </div>

  <!-- BOOST TOGGLES -->
  <div class="boost-section">
    <button class="boost-btn" id="bassBtn">
      <svg viewBox="0 0 24 24">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/>
        <circle cx="18" cy="16" r="3"/>
      </svg>
      Bass
    </button>
    <button class="boost-btn" id="voiceBtn">
      <svg viewBox="0 0 24 24">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
      Voice
    </button>
  </div>

  <div class="controls">
    <button class="btn" id="muteBtn">
      <svg id="speakerIcon" viewBox="0 0 24 24">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
      </svg>
      <span id="muteLabel">Mute</span>
    </button>
    <button class="btn" id="resetBtn">
      <svg viewBox="0 0 24 24">
        <polyline points="1 4 1 10 7 10"></polyline>
        <path d="M3.51 15a9 9 0 1 0 .49-3.5"></path>
      </svg>
      Reset
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
